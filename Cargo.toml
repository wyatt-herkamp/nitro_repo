[workspace]
members = ["crates/common", "backend", "nrc", "crates/internal_macros", "crates/entities"]
resolver = "2"


[workspace.package]
version = "2.0.0-beta"
license = "MIT"
authors = ["Wyatt Jacob Herkamp <wherkamp@gmail.com>"]
repository = "https://github.com/wyatt-herkamp/nitro_repo"
edition = "2021"
homepage = "https://nitro_repo.wyatt-herkamp.dev"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
thiserror = "1"
strum = { version = "0.25", features = ["derive"] }
clap = { version = "4.4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tracing = "0.1"
config_types = { git = "https://github.com/wyatt-herkamp/config_types.git", features = [
    "strum",
    "digestible",
] }
